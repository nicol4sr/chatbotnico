<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Stats Bot - Mundial Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background-color: #1a1a1a; /* Fondo oscuro deportivo */
            /* Fondo sutil de patrón de césped (opcional, si tienes una imagen) */
            background-image: linear-gradient(rgba(26, 26, 26, 0.95), rgba(26, 26, 26, 0.95)), url('https://www.transparenttextures.com/patterns/p6.png');
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            color: white;
        }
        
        /* Navbar estilo "Champions" */
        .navbar { background-color: #0d4a11 !important; border-bottom: 3px solid #f1c40f; }
        .navbar-brand { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #f1c40f !important; }
        .navbar-text { color: rgba(255,255,255,0.8) !important; font-size: 0.9rem; }

        /* Contenedor principal de Chat */
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: rgba(255,255,255,0.03); /* Fondo translúcido */
            border-radius: 10px;
            margin: 20px;
        }

        /* Estilo de Mensajes */
        .message { 
            max-width: 80%; 
            padding: 15px 20px; 
            border-radius: 10px; 
            font-size: 1.05rem; 
            line-height: 1.4; 
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Mensaje del Usuario: Azul deportivo */
        .user-message { 
            align-self: flex-end; 
            background-color: #0056b3; 
            color: white; 
            border-bottom-right-radius: 2px; 
        }
        .user-message::after {
            content: '\f1e3'; /* Icono de balón */
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            bottom: -10px;
            right: 10px;
            color: rgba(255,255,255,0.3);
            font-size: 1.2rem;
        }

        /* Mensaje del Bot: Verde césped */
        .bot-message { 
            align-self: flex-start; 
            background-color: #2ecc71; 
            color: #1a1a1a; 
            border-bottom-left-radius: 2px; 
            font-weight: 500;
        }
        .bot-message::before {
            content: '\f3ed'; /* Icono de escudo */
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            top: -10px;
            left: 10px;
            color: rgba(0,0,0,0.1);
            font-size: 1.2rem;
        }

        /* Área de entrada de texto */
        .input-area { 
            background: #2c3e50; 
            padding: 20px; 
            border-top: 2px solid #f1c40f; 
        }
        .form-control {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.1rem;
        }
        .form-control:focus {
            background-color: rgba(255,255,255,0.15);
            color: white;
            border-color: #f1c40f;
            box-shadow: 0 0 0 0.25rem rgba(241, 196, 15, 0.25);
        }
        
        /* Botón "Enviar" dorado */
        .btn-futbol {
            background-color: #f1c40f;
            border-color: #f1c40f;
            color: #1a1a1a;
            font-weight: 700;
            text-transform: uppercase;
        }
        .btn-futbol:hover {
            background-color: #e1b400;
            border-color: #e1b400;
            color: black;
        }

        /* Indicador de "Escribiendo" */
        .typing { 
            font-style: italic; 
            font-size: 0.9rem; 
            color: #f1c40f; 
            display: none; 
            margin-left: 20px;
            margin-top: -10px;
        }
        
        /* Scrollbar personalizado */
        .chat-container::-webkit-scrollbar { width: 8px; }
        .chat-container::-webkit-scrollbar-thumb { background: #f1c40f; border-radius: 10px; }
        .chat-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-trophy me-2"></i>Fútbol Stats Bot
            </span>
           
        </div>
    </nav>

    <div class="chat-container" id="chat-window">
        <div class="message bot-message">
            <i class="fas fa-whistle me-2"></i>¡Pitazo inicial! Soy tu asistente táctico. Pregúntame lo que quieras sobre el documento los mundiales ¿Quién ganó en qué año? ¿Goleadores? ¡Dispara!
        </div>
    </div>

    <div class="typing" id="typing-indicator">
        <i class="fas fa-spinner fa-spin me-1"></i> El VAR está revisando la jugada (procesando respuesta)...
    </div>

    <div class="input-area mt-auto">
        <div class="container">
            <div class="input-group">
                <span class="input-group-text bg-transparent text-white border-secondary">
                    <i class="fas fa-comment-dots"></i>
                </span>
                <input type="text" id="user-input" class="form-control" placeholder="Ej: ¿Quién ganó el mundial de 1978?" aria-label="Pregunta de fútbol">
                <button class="btn btn-futbol px-4" type="button" onclick="sendMessage()">
                    Enviar Pase <i class="fas fa-paper-plane ms-1"></i>
                </span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // Permitir enviar con la tecla Enter
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Agregar mensaje del usuario
            addMessage(message, 'user-message');
            userInput.value = '';
            
            // Mostrar indicador de carga futbolero
            typingIndicator.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('https://nicol4sr.github.io/chatbotnico/templates/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                // Agregar respuesta del bot
                addMessage(data.response, 'bot-message');
            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage("<i class='fas fa-exclamation-triangle me-2'></i>¡Tarjeta Roja! Hubo un error en la conexión al servidor.", 'bot-message text-danger bg-warning');
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
